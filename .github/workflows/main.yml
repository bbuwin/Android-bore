name: Android Emulator + Bore Tunnel

on:
  workflow_dispatch:

jobs:
  emulator:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip curl libglu1-mesa

      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk

          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-*.zip -d cmdline-tools
          mv cmdline-tools/cmdline-tools cmdline-tools/latest

          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "PATH=$HOME/android-sdk/cmdline-tools/latest/bin:$HOME/android-sdk/platform-tools:$HOME/android-sdk/emulator:$PATH" >> $GITHUB_ENV

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager --update

          sdkmanager \
            "platform-tools" \
            "emulator" \
            "platforms;android-30" \
            "system-images;android-30;google_apis;x86_64"

      - name: Create AVD
        run: |
          echo "no" | avdmanager create avd \
            -n test \
            -k "system-images;android-30;google_apis;x86_64" \
            --device "pixel"

      - name: Start emulator
        run: |
          nohup emulator -avd test \
            -no-window \
            -no-audio \
            -no-boot-anim \
            -gpu off \
            -accel off \
            -netdelay none \
            -netspeed full > emulator.log 2>&1 &

          adb wait-for-device

          echo "Waiting for full boot..."
          boot_completed=""
          until [[ "$boot_completed" == "1" ]]; do
            boot_completed=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
            sleep 5
          done

          echo "Emulator booted!"

          adb devices

      - name: Enable ADB over TCP
        run: |
          adb tcpip 5555
          sleep 3
          adb connect localhost:5555
          adb devices

      - name: Install Bore
        run: |
          curl -L https://github.com/ekzhang/bore/releases/download/v0.4.0/bore-v0.4.0-x86_64-unknown-linux-musl.tar.gz | tar xz
          chmod +x bore

      - name: Start Bore tunnel
        run: |
          echo "Starting bore tunnel on port 5555..."
          ./bore local 5555 --to bore.pub
