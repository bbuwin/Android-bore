name: Android Emulator with APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Android Emulator Runner
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: default  # No YouTube preinstalled
          arch: x86_64
          profile: Nexus 6
          emulator-options: -no-snapshot -no-window -no-audio -gpu swiftshader_indirect
          script: |
            # Check if APK exists
            if [ ! -f "app.apk" ]; then
              echo "ERROR: app.apk not found"
              exit 1
            fi
            
            # Install APK
            adb install app.apk
            
            # Get package name (using aapt2 if available)
            PACKAGE_NAME=$(adb shell pm list packages | tail -1 | cut -d':' -f2)
            echo "Installed package: $PACKAGE_NAME"
            
            # Launch app
            MONKEY_OUTPUT=$(adb shell monkey -p $PACKAGE_NAME 1 2>&1)
            if echo "$MONKEY_OUTPUT" | grep -q "Events injected"; then
              echo "✅ App launched successfully"
            else
              echo "⚠️ Could not launch, but APK installed"
            fi
