name: Android Emulator with APK

on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: 'URL to APK file'
        required: true
        default: 'https://pixeldrain.dev/api/file/2PKBcfDv'

jobs:
  run-emulator:
    runs-on: ubuntu-latest
    
    steps:
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      
      - name: Install aapt (Android Asset Packaging Tool)
        run: |
          sudo apt-get update
          sudo apt-get install -y aapt
      
      - name: Download APK
        run: |
          wget -O app.apk "${{ github.event.inputs.apk_url }}"
          ls -lh app.apk  # Verify download worked
      
      - name: Run Emulator & Install APK
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: Nexus 6
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -no-audio -no-boot-anim -no-accel
          emulator-build: 30.0.16  # Stable emulator version
          script: |
            adb wait-for-device
            adb shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done'
            adb shell settings put global window_animation_scale 0
            adb shell settings put global transition_animation_scale 0
            
            adb install app.apk
            
            # Alternative way to get package name if aapt fails
            PACKAGE=$(aapt dump badging app.apk 2>/dev/null | grep package | awk '{print $2}' | sed s/name=//g | sed s/\'//g)
            if [ -z "$PACKAGE" ]; then
              echo "aapt failed, trying alternative method..."
              PACKAGE=$(adb shell pm list packages -3 | head -1 | cut -d':' -f2)
            fi
            
            echo "Launching package: $PACKAGE"
            adb shell monkey -p $PACKAGE 1
            
            sleep 3600
