name: Android Emulator with APK

on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: 'URL to APK file'
        required: true
        default: 'https://pixeldrain.dev/api/file/2PKBcfDv'

jobs:
  run-emulator:
    runs-on: ubuntu-latest
    
    steps:
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      
      - name: Download APK
        run: |
          wget -O app.apk "${{ github.event.inputs.apk_url }}"
          ls -lh app.apk
      
      - name: Run Emulator & Install APK
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 32
          target: google_apis
          arch: x86_64
          profile: Nexus 6
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -no-audio -no-boot-anim
          script: |
            adb wait-for-device
            adb shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done'
            
            # Remove pre-installed YouTube
            adb uninstall com.google.android.youtube || true
            
            # Install your APK
            adb install app.apk
            
            # Launch the app
            PACKAGE=$(aapt dump badging app.apk | grep package | awk '{print $2}' | sed s/name=//g | sed s/\'//g)
            adb shell monkey -p $PACKAGE 1
            
            sleep 3600
