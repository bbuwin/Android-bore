name: Android Emulator with Bore

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          script: |
            # Wait for device
            adb wait-for-device
            sleep 15
            
            # Download VNC APK (using working URL)
            wget -O vnc.apk https://github.com/bk138/droidVNC-NG/releases/download/v1.4.0/droidVNC-NG_v1.4.0.apk
            
            # Install VNC
            adb install vnc.apk
            
            # Launch VNC
            adb shell am start -n com.iiordanov.droidVNC/.MainActivity
            sleep 5
            
            # Configure password
            adb shell input tap 500 800
            sleep 1
            adb shell input text "vnc123"
            sleep 1
            adb shell input tap 500 900
            sleep 1
            adb shell input tap 300 1000
            
            echo "✅ VNC ready on port 5900"
            
            # Keep alive
            while true; do sleep 300; done

      - name: Install Bore
        run: |
          wget https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-x86_64-unknown-linux-musl.tar.gz
          tar -xzf bore-v0.5.0-x86_64-unknown-linux-musl.tar.gz
          chmod +x bore

      - name: Start Bore Tunnel
        run: |
          echo "========================================="
          echo "📱 ANDROID EMULATOR READY"
          echo "========================================="
          echo "🔑 VNC Password: vnc123"
          echo ""
          echo "📡 Your Bore address:"
          echo "========================================="
          ./bore local 5900 --to bore.pub
