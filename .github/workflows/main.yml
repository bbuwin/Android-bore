name: Android Emulator with APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Fix KVM permissions
        run: |
          sudo chown runner:root /dev/kvm
          sudo chmod 666 /dev/kvm
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Run Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: default
          arch: x86_64
          profile: Nexus 6
          emulator-options: -no-snapshot -no-window -no-audio -gpu swiftshader_indirect -accel on
          disable-animations: true
          script: |
            # Check if APK exists
            if [ ! -f "app.apk" ]; then
              echo "❌ app.apk not found!"
              exit 1
            fi
            
            echo "📱 Installing APK..."
            adb install app.apk
            
            PACKAGE_NAME=$(adb shell pm list packages | tail -1 | cut -d':' -f2 | tr -d '\r')
            echo "✅ Successfully installed: $PACKAGE_NAME"
            
            adb shell monkey -p $PACKAGE_NAME 1
            echo "✅ App launched successfully"
