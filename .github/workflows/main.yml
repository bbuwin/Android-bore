name: Android Emulator with Bore

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          script: |
            # Install VNC server on emulator
            adb shell wget -O /data/local/tmp/vnc.apk https://github.com/bk138/droidVNC-NG/releases/download/v1.4.0/droidVNC-NG_v1.4.0.apk
            adb install /data/local/tmp/vnc.apk
            adb shell am start -n com.iiordanov.droidVNC/.MainActivity
            sleep 5
            adb shell input tap 500 800
            adb shell input text "vnc123"
            adb shell input tap 500 900
            adb shell input tap 300 1000
            echo "VNC server running on port 5900"
            while true; do sleep 300; done

      - name: Setup Bore Tunnel
        run: |
          wget -q https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-x86_64-unknown-linux-musl.tar.gz
          tar -xzf bore-v0.5.0-x86_64-unknown-linux-musl.tar.gz
          chmod +x bore
          echo "========================================="
          echo "✅ ANDROID EMULATOR READY"
          echo "========================================="
          echo "Connect via VNC Viewer to: bore.pub:XXXXX"
          echo "Password: vnc123"
          echo "========================================="
          ./bore local 5900 --to bore.pub
